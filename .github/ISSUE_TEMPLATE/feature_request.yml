name: 💡 Feature request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Describe what you'd like to see.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem would this feature solve?
      placeholder: It's frustrating when...
    validations:
      required: false

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: I also thought about...
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Firmware
        - Web UI
        - Home Assistant
        - Documentation
        - Hardware
        - Other
    validations:
      required: true
