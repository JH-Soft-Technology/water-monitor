# ============================================================================
# Water Monitor - Lovelace Dashboard (v2.2)
# ============================================================================
# Použití:
#   1. Otevři Home Assistant
#   2. Boční menu → Nastavení → Dashboardy → vytvořit novou (Add Dashboard)
#      nebo otevři existující v "Edit Dashboard" mode → "Edit in YAML"
#   3. Vlož celý obsah níže (od 'title:')
#   4. Ulož
#
# Předpoklady:
#   - MQTT integration je aktivní v HA
#   - ESP s firmware v2.2+ posílá MQTT discovery, takže máš entity:
#       sensor.water_tank_prutok_aktualni         (live průtok L/min)
#       sensor.water_tank_objem_za_minutu         (last minute L)
#       sensor.water_tank_objem_za_hodinu         (last hour L)
#       sensor.water_tank_objem_celkem            (kumulativní L od startu)
#       sensor.water_tank_vzdalenost_senzor       (cm)
#       sensor.water_tank_hladina_v_nadrzi        (cm)
#       sensor.water_tank_objem_v_nadrzi          (L)
#       sensor.water_tank_naplneni_nadrze         (%)
#       sensor.water_tank_spotreba_dnes           (firmware-managed denní spotřeba)
#       sensor.water_tank_spotreba_tento_tyden    (firmware-managed týdenní spotřeba)
#       sensor.water_tank_spotreba_tento_mesic    (firmware-managed měsíční spotřeba)
#       sensor.water_tank_spotreba_tento_rok      (firmware-managed roční spotřeba)
#
# Pozn.: Period stats (today/week/month/year) jsou teď řízené přímo firmwarem
#   přes NTP - resetují se vždy v 00:00 CET/CEST. Není potřeba HA utility_meter.
#
# Pokud máš jiné názvy entit (záleží na jazyce HA a tvém device_id),
# najdi je v Vývojářské nástroje → Stavy a uprav v této YAML.
# ============================================================================

title: Voda
views:
  - title: Voda
    path: voda
    icon: mdi:water
    type: sections
    max_columns: 3
    sections:

      # ======================================================================
      # SEKCE 1: STAV NÁDRŽE
      # ======================================================================
      - type: grid
        column_span: 1
        cards:
          - type: heading
            heading: 💧 Stav nádrže
            heading_style: title

          - type: gauge
            entity: sensor.water_tank_naplneni_nadrze
            name: Naplnění
            unit: '%'
            min: 0
            max: 100
            severity:
              green: 30
              yellow: 15
              red: 0
            needle: true

          - type: entities
            title: Detaily nádrže
            show_header_toggle: false
            entities:
              - entity: sensor.water_tank_objem_v_nadrzi
                name: Objem v nádrži
                icon: mdi:cup-water
              - entity: sensor.water_tank_hladina_v_nadrzi
                name: Výška hladiny
                icon: mdi:waves-arrow-up
              - entity: sensor.water_tank_vzdalenost_senzor
                name: Vzdálenost od senzoru
                icon: mdi:arrow-up-down

      # ======================================================================
      # SEKCE 2: AKTUÁLNÍ PRŮTOK
      # ======================================================================
      - type: grid
        column_span: 1
        cards:
          - type: heading
            heading: 🚰 Průtok
            heading_style: title

          - type: gauge
            entity: sensor.water_tank_prutok_aktualni
            name: Aktuální průtok
            unit: 'L/min'
            min: 0
            max: 80
            severity:
              green: 0
              yellow: 50
              red: 70
            needle: true

          - type: entities
            title: Objemy
            show_header_toggle: false
            entities:
              - entity: sensor.water_tank_objem_za_minutu
                name: Za poslední minutu
                icon: mdi:water
              - entity: sensor.water_tank_objem_za_hodinu
                name: Za poslední hodinu
                icon: mdi:water
              - entity: sensor.water_tank_objem_celkem
                name: Celkem od startu
                icon: mdi:counter

      # ======================================================================
      # SEKCE 3: SPOTŘEBA - SOUHRN OBDOBÍ (NOVÉ ve v2.2)
      # ======================================================================
      - type: grid
        column_span: 1
        cards:
          - type: heading
            heading: 📊 Spotřeba (období)
            heading_style: title

          - type: entities
            title: Souhrny období
            show_header_toggle: false
            entities:
              - entity: sensor.water_tank_spotreba_dnes
                name: Dnes
                icon: mdi:calendar-today
              - entity: sensor.water_tank_spotreba_tento_tyden
                name: Tento týden
                icon: mdi:calendar-week
              - entity: sensor.water_tank_spotreba_tento_mesic
                name: Tento měsíc
                icon: mdi:calendar-month
              - entity: sensor.water_tank_spotreba_tento_rok
                name: Tento rok
                icon: mdi:calendar

          - type: glance
            title: Souhrny období
            columns: 4
            show_state: true
            show_name: true
            show_icon: true
            entities:
              - entity: sensor.water_tank_spotreba_dnes
                name: Den
                icon: mdi:calendar-today
              - entity: sensor.water_tank_spotreba_tento_tyden
                name: Týden
                icon: mdi:calendar-week
              - entity: sensor.water_tank_spotreba_tento_mesic
                name: Měsíc
                icon: mdi:calendar-month
              - entity: sensor.water_tank_spotreba_tento_rok
                name: Rok
                icon: mdi:calendar

      # ======================================================================
      # SEKCE 4: GRAFY PRŮTOKU (24 h)
      # ======================================================================
      - type: grid
        column_span: 3
        cards:
          - type: heading
            heading: 📈 Průtok za 24 hodin
            heading_style: title

          - type: history-graph
            title: Aktuální průtok
            hours_to_show: 24
            refresh_interval: 60
            entities:
              - entity: sensor.water_tank_prutok_aktualni
                name: Průtok L/min

      # ======================================================================
      # SEKCE 5: GRAFY HLADINY (7 dnů)
      # ======================================================================
      - type: grid
        column_span: 3
        cards:
          - type: heading
            heading: 📉 Hladina v nádrži (7 dnů)
            heading_style: title

          - type: history-graph
            title: Naplnění nádrže
            hours_to_show: 168
            refresh_interval: 600
            entities:
              - entity: sensor.water_tank_naplneni_nadrze
                name: Naplnění %
              - entity: sensor.water_tank_objem_v_nadrzi
                name: Objem L

      # ======================================================================
      # SEKCE 6: GRAFY SPOTŘEBY - DEN / TÝDEN / MĚSÍC / ROK (NOVÉ ve v2.2)
      # ======================================================================
      - type: grid
        column_span: 3
        cards:
          - type: heading
            heading: 📊 Spotřeba - grafy období
            heading_style: title

          # Denní spotřeba za posledních 30 dnů
          - type: statistics-graph
            title: Denní spotřeba (30 dnů)
            chart_type: bar
            period: day
            days_to_show: 30
            stat_types:
              - max
            entities:
              - sensor.water_tank_spotreba_dnes

          # Týdenní spotřeba za posledních ~12 týdnů
          - type: statistics-graph
            title: Týdenní spotřeba (3 měsíce)
            chart_type: bar
            period: week
            days_to_show: 90
            stat_types:
              - max
            entities:
              - sensor.water_tank_spotreba_tento_tyden

          # Měsíční spotřeba za posledních 12 měsíců
          - type: statistics-graph
            title: Měsíční spotřeba (12 měsíců)
            chart_type: bar
            period: month
            days_to_show: 365
            stat_types:
              - max
            entities:
              - sensor.water_tank_spotreba_tento_mesic

          # Roční spotřeba (vícero roků)
          - type: statistics-graph
            title: Roční spotřeba
            chart_type: bar
            period: month
            days_to_show: 730
            stat_types:
              - max
            entities:
              - sensor.water_tank_spotreba_tento_rok

      # ======================================================================
      # SEKCE 7: SYSTÉM
      # ======================================================================
      - type: grid
        column_span: 3
        cards:
          - type: heading
            heading: ⚙️ Systém
            heading_style: subtitle

          - type: entities
            title: Status zařízení
            show_header_toggle: false
            entities:
              - type: section
                label: Konfigurace
              - entity: sensor.water_tank_status
                name: Online stav
                icon: mdi:connection
              - type: weblink
                name: Web rozhraní ESP
                url: http://watertank.local/
                icon: mdi:web
              - type: weblink
                name: OTA Update
                url: http://watertank.local/update
                icon: mdi:cloud-upload
